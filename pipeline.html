<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pipeline SDR · João Figueira</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117;--s:#141C2E;--s2:#1A2030;--bd:#2D3748;
  --txt:#E5E7EB;--mt:#6B7280;--mt2:#1E2740;
  --ns:#60A5FA;--vs:#A78BFA;--gs:#4ADE80;
  --eq:#4ADE80;--q:#60A5FA;--n:#FCD34D;--nq:#F87171;
  --red:#F87171;--yel:#FCD34D;--grn:#4ADE80;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:auto;padding-bottom:40px}

/* HEADER */
.header{background:var(--s);border-bottom:1px solid var(--bd);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px}
.logo{background:#C9A96E;border-radius:8px;padding:6px 10px;font-weight:800;font-size:12px;color:#fff;letter-spacing:1px;font-family:'Playfair Display',serif}
.ht{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;color:#fff}
.hs{font-size:11px;color:var(--mt)}
.hacts{display:flex;gap:7px;align-items:center}
.btn-add{background:#C9A96E;border:none;border-radius:7px;padding:8px 16px;color:#0D1117;font-weight:600;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.03em}
.btn-sec{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:7px 13px;color:var(--mt);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.stats{display:flex;gap:6px;flex-wrap:wrap}
.stat{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--mt)}
.stat span{color:#fff;font-weight:600}

/* ALERT BANNER */


/* PIPELINE */
.pipe{display:flex;gap:10px;padding:14px;min-width:max-content;align-items:flex-start}
.col{background:var(--s);border:1px solid var(--bd);border-radius:11px;width:220px;flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100vh - 115px)}
.col-hdr{padding:11px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;border-radius:11px 11px 0 0;background:var(--s)}
.col-title{font-family:'Playfair Display',serif;font-weight:700;font-size:11px;letter-spacing:.6px;text-transform:uppercase}
.col-cnt{background:var(--mt2);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--mt)}
.col-bar{height:2px;margin:0 13px}
.col-cards{padding:9px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1}
.col-cards::-webkit-scrollbar{width:3px}
.col-cards::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.col-empty{padding:18px 8px;text-align:center;font-size:11px;color:var(--mt2);border:1px dashed var(--bd);border-radius:7px}

/* CARD */
.card{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 11px;cursor:pointer;transition:border-color .2s,transform .1s;border-left-width:3px}
.card:hover{border-color:#2e2e55;transform:translateY(-1px)}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-name{font-weight:600;font-size:13px;color:#fff}
.badges{display:flex;gap:3px}
.badge{font-size:9px;border-radius:3px;padding:2px 5px;font-weight:700}
.bn{background:#60A5FA22;color:#60A5FA;border:1px solid #60A5FA55;font-weight:700}
.bv{background:#A78BFA22;color:#A78BFA;border:1px solid #A78BFA55;font-weight:700}
.bg{background:#4ADE8022;color:#4ADE80;border:1px solid #4ADE8055;font-weight:700}
.baq{background:#4ADE8018;color:#4ADE80}
.bq{background:#60A5FA18;color:#60A5FA}
.bn2{background:#FCD34D18;color:#FCD34D}
.bnq{background:#F8717118;color:#F87171}
.sbar{height:2px;background:var(--bd);border-radius:2px;margin-bottom:7px;overflow:hidden}
.sfill{height:100%;border-radius:2px}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.fuchip{font-size:10px;border-radius:4px;padding:2px 6px;font-weight:500}
.fu-ok{background:#4ADE8010;color:#4ADE80}
.fu-new{background:#60A5FA10;color:#60A5FA}
.fu-warn{background:#FCD34D10;color:#FCD34D}
.fu-alert{background:#F8717110;color:#F87171}
.card-note{font-size:11px;color:var(--mt);margin-top:5px;line-height:1.4;border-top:1px solid var(--mt2);padding-top:5px}
.card-prof{font-size:10px;color:var(--mt);margin-bottom:4px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--s);border:1px solid var(--bd);border-radius:14px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:22px}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
.mtitle{font-family:'Playfair Display',serif;font-weight:800;font-size:17px;color:#fff;margin-bottom:16px}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:var(--mt);letter-spacing:.7px;text-transform:uppercase;margin-bottom:5px;display:block}
.fi{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:9px 12px;color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.fi:focus{border-color:#C9A96E}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fsel{appearance:none}
.rgroup{display:flex;gap:5px;flex-wrap:wrap}
.rbtn{background:var(--bg);border:1px solid var(--bd);border-radius:5px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--mt);transition:all .15s;font-family:'DM Sans',sans-serif}
.rbtn.s-ns{border-color:#C9A96E;color:#C9A96E;background:#C9A96E18}
.rbtn.s-vs{border-color:#A78BFA;color:#A78BFA;background:#A78BFA11}
.rbtn.s-gs{border-color:#4ADE80;color:#4ADE80;background:#4ADE8011}
.rbtn.s-aq{border-color:#4ADE80;color:#4ADE80;background:#4ADE8011}
.rbtn.s-q{border-color:#C9A96E;color:#C9A96E;background:#C9A96E18}
.rbtn.s-n{border-color:#FCD34D;color:#FCD34D;background:#FCD34D11}
.rbtn.s-nq{border-color:#F87171;color:#F87171;background:#F8717111}
.rbtn.s-tipo-sel{border-color:#C9A96E;color:#C9A96E;background:#C9A96E18}
.macts{display:flex;gap:8px;margin-top:18px}
.mbtn-save{flex:1;background:#C9A96E;border:none;border-radius:7px;padding:11px;color:#0D1117;font-weight:600;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}
.mbtn-cancel{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:11px 14px;color:var(--mt);cursor:pointer;font-family:'DM Sans',sans-serif}
.mbtn-del{background:#F8717111;border:1px solid #F8717144;border-radius:7px;padding:11px 14px;color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif}

/* DETAIL MODAL */
.dsec{margin-bottom:14px}
.dlbl{font-size:10px;color:var(--mt);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.dval{font-size:14px;color:#fff}
.mbtns{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.mbtn{background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:6px 11px;font-size:11px;color:var(--mt);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.mbtn:hover{border-color:#C9A96E;color:#C9A96E}
.mbtn.cur{border-color:var(--grn);color:var(--grn);background:#4ADE8011}

/* SCRIPT BOX */
.script-box{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:12px;font-size:12px;color:#aaa;line-height:1.6;margin-top:8px}
.script-box strong{color:#C9A96E;display:block;margin-bottom:6px;font-size:11px;letter-spacing:.5px;text-transform:uppercase}
.script-option{background:var(--mt2);border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:12px;color:#bbb;line-height:1.5}
.script-option:last-child{margin-bottom:0}

/* TIMELINE */
.tl{border-left:2px solid var(--bd);padding-left:14px;margin-top:8px}
.tl-item{position:relative;margin-bottom:10px}
.tl-item::before{content:'';position:absolute;left:-19px;top:4px;width:8px;height:8px;background:var(--bd);border-radius:50%}
.tl-item.done::before{background:var(--grn)}
.tl-item.warn::before{background:var(--yel)}
.tl-item.alert::before{background:var(--red)}
.tl-date{font-size:10px;color:var(--mt)}
.tl-text{font-size:12px;color:var(--txt)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 20px;font-size:13px;color:#fff;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.5);display:none}
.toast.show{display:block}
.divider{height:1px;background:var(--bd);margin:12px 0}

/* SELEÇÃO MÚLTIPLA */
.card-cb{position:absolute;top:9px;left:9px;width:16px;height:16px;accent-color:#C9A96E;cursor:pointer;z-index:5;opacity:0;transition:opacity .15s}
.card-wrap{position:relative}
.card-wrap:hover .card-cb, .card-wrap.selected .card-cb{opacity:1}
.card-wrap.selected .card{border-color:#C9A96E88;background:#C9A96E08}
.col-hdr-cb{width:14px;height:14px;accent-color:#C9A96E;cursor:pointer;flex-shrink:0}

/* BARRA FLUTUANTE DE AÇÃO */
.sel-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#141C2E;border:1px solid #C9A96E55;border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:12px;z-index:400;box-shadow:0 6px 32px rgba(0,0,0,.7);flex-wrap:wrap;max-width:92vw;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateX(-50%) translateY(10px)}
.sel-bar.visible{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}
.sel-count{font-size:13px;font-weight:700;color:#C9A96E;white-space:nowrap}
.sel-label{font-size:12px;color:#6B7280;white-space:nowrap}
.sel-stage-select{background:#1A2030;border:1px solid #2D3748;border-radius:7px;padding:7px 10px;color:#fff;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.sel-move-btn{background:#C9A96E;border:none;border-radius:7px;padding:8px 18px;color:#0D1117;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.sel-clear-btn{background:transparent;border:1px solid #2D3748;border-radius:7px;padding:7px 12px;color:#6B7280;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}

/* INPUT DE DATA CUSTOMIZADO */
.date-wrap{position:relative;display:inline-flex;align-items:center}
.date-wrap input[type=date]{padding-right:30px;color-scheme:dark}
.date-wrap input[type=date]::-webkit-calendar-picker-indicator{opacity:0;position:absolute;right:0;width:100%;height:100%;cursor:pointer}
.date-cal-icon{position:absolute;right:8px;font-size:14px;pointer-events:none;line-height:1}

/* ── MOBILE PIPELINE ─────────────────────────────────── */
@media(max-width:768px){
  .header{padding:10px 14px;flex-wrap:wrap;gap:8px}
  .header .stats{display:none}
  .hacts{gap:6px}
  .hacts .btn-add{padding:8px 12px;font-size:12px}
  .hacts .btn-sec{padding:7px 10px;font-size:11px}
  /* Pipeline lista vertical */
  .pipe{flex-direction:column;min-width:unset;padding:10px 12px;gap:8px}
  .col{width:100%;max-height:none}
  .col-cards{max-height:none;overflow-y:visible}
  /* Toolbar toggle visível */
  #pipe-toolbar-toggle{display:flex !important}
  #pipe-toolbar-body{flex-wrap:wrap}
  #pipe-toolbar-body{display:none}
  #pipe-toolbar-body.open{display:flex !important}
  /* Filtros */
  .filter-bar{flex-wrap:wrap;gap:6px}
  .filter-bar select, .filter-bar input{font-size:14px;padding:8px 10px}
  /* Cards maiores no mobile */
  .card{padding:12px 13px}
  .card-name{font-size:14px}
  /* Modal full screen no mobile */
  .overlay{padding:0;align-items:flex-end}
  .modal{border-radius:16px 16px 0 0;max-height:90vh;padding:20px}
}
</style>

<!-- ALERT BANNER -->
<div id="loading-screen" style="position:fixed;inset:0;background:#0D1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px">

    <button onclick="exportXLSX()" style="background:#1A2030;border:1px solid #2D3748;border-radius:6px;padding:8px 14px;color:#FCD34D;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600">📊 Exportar Excel</button>
  </div>
</div>

<!-- PIPELINE -->
<div style="background:#0D1117;border-bottom:1px solid #2D3748;padding:8px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
  <div style="position:relative;flex:1;min-width:160px;max-width:240px">
    <input type="text" id="pipe-search" placeholder="🔍 Buscar @lead..." oninput="render()"
      style="width:100%;background:#1A2030;border:1px solid #2D3748;border-radius:7px;padding:7px 30px 7px 10px;color:#E5E7EB;font-size:13px;font-family:'DM Sans',sans-serif;outline:none"
      onfocus="this.style.borderColor='#C9A96E'" onblur="this.style.borderColor='#2D3748'"/>
    <button id="pipe-search-clear" onclick="clearPipeSearch()" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#6B7280;cursor:pointer;font-size:12px">✕</button>
  </div>
  <span style="font-size:11px;color:#6B7280;letter-spacing:.5px;text-transform:uppercase;margin-right:4px">Filtrar:</span>
  <button class="pipe-cls-filter" data-cls="all" onclick="setPipeFilter('all')" style="border-radius:6px;padding:5px 12px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:600;border:1px solid #2D3748;background:#1A2030;color:#aaa;transition:all .15s">Todos</button>
  <button class="pipe-cls-filter" data-cls="AQ" onclick="setPipeFilter('AQ')" style="border-radius:6px;padding:5px 12px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:700;border:1px solid #4ADE8044;background:#4ADE8011;color:#4ADE80;transition:all .15s">AQ</button>

  <button class="pipe-cls-filter" data-cls="NQ" onclick="setPipeFilter('NQ')" style="border-radius:6px;padding:5px 12px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:700;border:1px solid #F8717144;background:#F8717111;color:#F87171;transition:all .15s">NQ</button>
  <select id="filter-month" onchange="render()" style="background:#1A2030;border:1px solid #2D3748;border-radius:6px;padding:6px 10px;color:#aaa;font-size:12px;font-family:'DM Sans',sans-serif;outline:none">

  <select id="filter-year" onchange="render()" style="background:#1A2030;border:1px solid #2D3748;border-radius:6px;padding:6px 10px;color:#aaa;font-size:12px;font-family:'DM Sans',sans-serif;outline:none">
    <option value="">Todos os anos</option>

  <div class="date-wrap"><input type="date" id="filter-from" onchange="render()" style="background:#1A2030;border:1px solid #2D3748;border-radius:6px;padding:6px 10px;color:#aaa;font-size:12px;font-family:'DM Sans',sans-serif;outline:none" title="Data início"/><span class="date-cal-icon">📅</span></div>

  <button onclick="clearDateFilter()" style="background:transparent;border:1px solid #2D3748;border-radius:6px;padding:6px 12px;color:#6B7280;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif">✕ Limpar</button>
</div>

async function load(){

  if(error){ console.error("load:", error); return; }

    id: r.id, username: r.username, score: r.score, cls: r.cls,
    color: r.color, fluxo: r.fluxo||"NS", prof: r.prof||"",
    note: r.note||"", stage: r.stage||0,
    tipo_perfil: r.tipo_perfil||"publico",
    timeline_checks: r.timeline_checks||{},
    lastDate: r.last_date, fromCDP: r.from_cdp,
    createdAt: r.created_at
  }));
}

async function insertLeadDB(lead){
  const { error } = await sb.from("pipeline_leads").insert({
    id: lead.id, user_id: currentUser.id,
    username: lead.username, score: lead.score||null,
    cls: lead.cls||"Q", color: lead.color||"#60A5FA",
    fluxo: lead.fluxo||"NS", prof: lead.prof||"",
    note: lead.note||"", stage: lead.stage||0,
    tipo_perfil: lead.tipo_perfil||"publico",
    timeline_checks: lead.timeline_checks||{},
    last_date: lead.lastDate||new Date().toISOString().split("T")[0],
    from_cdp: lead.fromCDP||false
  });
  if(error) throw error;
}

async function updateLeadDB(id, fields){
  const mapped = {};
  if(fields.username    !== undefined) mapped.username     = fields.username;
  if(fields.score       !== undefined) mapped.score        = fields.score;
  if(fields.cls         !== undefined) mapped.cls          = fields.cls;
  if(fields.color       !== undefined) mapped.color        = fields.color;
  if(fields.fluxo       !== undefined) mapped.fluxo        = fields.fluxo;
  if(fields.prof        !== undefined) mapped.prof         = fields.prof;
  if(fields.note        !== undefined) mapped.note         = fields.note;
  if(fields.stage       !== undefined) mapped.stage        = fields.stage;
  if(fields.lastDate    !== undefined) mapped.last_date    = fields.lastDate;
  if(fields.tipo_perfil !== undefined) mapped.tipo_perfil  = fields.tipo_perfil;
  if(fields.timeline_checks !== undefined) mapped.timeline_checks = fields.timeline_checks;
  const { error } = await sb.from("pipeline_leads").update(mapped).eq("id", id);
  if(error) throw error;
}

async function deleteLeadDB(id){
  const { error } = await sb.from("pipeline_leads").delete().eq("id", id);
  if(error) throw error;
}

async function batchUpdateStage(ids, stage, lastDate){
  // Supabase doesn't support IN with update via JS client easily, loop it
  for(const id of ids){
    const { error } = await sb.from("pipeline_leads")
      .update({ stage, last_date: lastDate }).eq("id", id);
    if(error) console.error("batchUpdateStage error:", error);
  }
}

function days(dt){ if(!dt) return 0; return Math.floor((Date.now()-new Date(dt).getTime())/(864e5)); }
function daysInPipeline(lead){ return days(lead.createdAt||lead.lastDate); }
function daysInStage(lead){ return days(lead.lastDate); }
function scColor(s){ return s>=8?"#4ADE80":s>=6?"#60A5FA":s>=4?"#FCD34D":"#F87171"; }
function clsColor(c){ return {EQ:"#4ADE80",AQ:"#4ADE80",Q:"#60A5FA",N:"#FCD34D",NQ:"#F87171"}[c]||"#60A5FA"; }
function fluxColor(f){ return {NS:"#60A5FA",VS:"#A78BFA",GS:"#4ADE80"}[f]||"#60A5FA"; }

function fuStatus(lead){
  const dStage = daysInStage(lead);   // dias na etapa atual (para urgência)
  const dTotal = daysInPipeline(lead); // dias totais no pipeline (para o badge)
  const rules = FU_RULES[lead.stage]||[];
  const checks = lead.timeline_checks||{};

  if(lead.stage===0) return {msg:"Pronto para contato",lv:"new",days:dTotal};
  if(lead.stage===9) return {msg:"Descartado",lv:"ok",days:dTotal};
  if(!rules.length)  return {msg:`${dStage}d na etapa`,lv:"ok",days:dTotal};

  // Encontrar o primeiro item NÃO marcado como feito
  for(let i=0; i<rules.length; i++){
    const key   = "stage_"+lead.stage+"_item_"+i;
    const done  = checks[key]===true;
    if(!done){
      const r  = rules[i];
      // Urgência baseada em dias NA ETAPA vs prazo do item
      const lv = dStage >= r.d ? r.lv : "ok";
      return {msg: r.t, lv, days: dTotal};
    }
  }
  // Todos os itens marcados
  return {msg:"✅ Etapa concluída", lv:"ok", days: dTotal};
}

function copyAt(username, e){
  if(e) e.stopPropagation();
  navigator.clipboard.writeText("@"+username).then(()=>{
    toast("📋 @"+username+" copiado!");

}

function toast(m){ const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500); }

    btn.style.opacity = isActive ? "1" : "0.55";
  });
  render();
}

function clearPipeSearch(){
  const el = document.getElementById("pipe-search");
  if(el) el.value = "";
  document.getElementById("pipe-search-clear").style.display = "none";
  render();
}

function applyPipeSearch(list){
  const el = document.getElementById("pipe-search");
  if(!el || !el.value.trim()) return list;
  const term = el.value.trim().toLowerCase().replace(/^@/,"");
  document.getElementById("pipe-search-clear").style.display = "block";
  return list.filter(l => l.username.toLowerCase().includes(term));
}

function clearDateFilter(){
  document.getElementById("filter-month").value="";
  document.getElementById("filter-year").value="";
  document.getElementById("filter-from").value="";
  document.getElementById("filter-to").value="";
  render();
}

function applyDateFilter(list){
  const fMonth = document.getElementById("filter-month")?.value;
  const fYear  = document.getElementById("filter-year")?.value;
  const fFrom  = document.getElementById("filter-from")?.value;
  const fTo    = document.getElementById("filter-to")?.value;
  if(!fMonth && !fYear && !fFrom && !fTo) return list;
  return list.filter(l=>{
    const isoDate = (l.lastDate||l.createdAt||"").split("T")[0];
    if(!isoDate) return false;
    const yyyy = isoDate.slice(0,4);
    const mm   = isoDate.slice(5,7);
    if(fFrom || fTo){
      if(fFrom && isoDate < fFrom) return false;
      if(fTo   && isoDate > fTo)   return false;
      return true;
    }
    if(fMonth && mm!==fMonth) return false;
    if(fYear  && yyyy!==fYear) return false;
    return true;
  });
}

function renderPipe(){
  const pipe=document.getElementById("pipe");
  pipe.innerHTML="";
  STAGES.forEach((st,idx)=>{
    const allInStage=leads.filter(l=>l.stage===idx);
    const clsFiltered = pipeClsFilter==='all' ? allInStage : allInStage.filter(l=>l.cls===pipeClsFilter);
    const statFiltered = statFilter===null ? clsFiltered
      : statFilter==='urgent' ? clsFiltered.filter(l=>fuStatus(l).lv==="alert")
      : clsFiltered.filter(l=>l.stage===5);
    const sl=applyPipeSearch(applyDateFilter(statFiltered));
    const colSelectedIds=sl.filter(l=>selectedIds.has(l.id));
    const allColSelected=sl.length>0&&colSelectedIds.length===sl.length;
    const col=document.createElement("div"); col.className="col";
    col.innerHTML=`
      <div class="col-hdr">
        <div style="display:flex;align-items:center;gap:7px;min-width:0">
          <input type="checkbox" class="col-hdr-cb" title="Selecionar todos nesta coluna"
            ${allColSelected?"checked":""}
            onchange="toggleColSelection(${idx}, this.checked)"
            onclick="event.stopPropagation()"/>
          <div class="col-title" style="color:${st.color}">${st.label}</div>
        </div>
        <div class="col-cnt">${sl.length}${allInStage.length!==sl.length?`<span style="color:#4B5563"> /${allInStage.length}</span>`:""}</div>
      </div>
      <div class="col-bar" style="background:${st.color}44"></div>
      <div class="col-cards">
        ${sl.length===0?'<div class="col-empty">Nenhum lead aqui</div>':sl.map(l=>renderCardWrap(l,st.color)).join("")}
      </div>`;
    pipe.appendChild(col);
  });
}

function renderCardWrap(l, stColor){
  const isSel = selectedIds.has(l.id);
  return `<div class="card-wrap${isSel?" selected":""}" id="wrap-${l.id}">
    <input type="checkbox" class="card-cb" ${isSel?"checked":""}
      onclick="toggleSelect('${l.id}', event)"
      title="Selecionar lead"/>
    ${renderCard(l, stColor)}
  </div>`;
}

function toggleSelect(id, event){
  event.stopPropagation();
  if(selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  // Atualiza visual do wrap sem re-renderizar tudo
  const wrap = document.getElementById("wrap-"+id);
  if(wrap) wrap.className = "card-wrap"+(selectedIds.has(id)?" selected":"");
  const cb = wrap?.querySelector(".card-cb");
  if(cb) cb.checked = selectedIds.has(id);
  updateSelBar();
  // Atualiza checkbox do header da coluna correspondente
  updateColCheckbox(leads.find(l=>l.id===id)?.stage);
}

function toggleColSelection(stageIdx, checked){
  const sl = applyDateFilter(leads.filter(l=>l.stage===stageIdx));
  sl.forEach(l=>{ if(checked) selectedIds.add(l.id); else selectedIds.delete(l.id); });
  // Re-render apenas as colunas afetadas visualmente
  renderPipe();
  updateSelBar();
}

function updateColCheckbox(stageIdx){
  if(stageIdx===undefined||stageIdx===null) return;
  const sl = applyDateFilter(leads.filter(l=>l.stage===stageIdx));
  const allSel = sl.length>0 && sl.every(l=>selectedIds.has(l.id));
  // Encontra o checkbox do header da coluna (por posição no pipe)
  const cols = document.querySelectorAll(".col-hdr-cb");
  if(cols[stageIdx]) cols[stageIdx].checked = allSel;
}

function updateSelBar(){
  const bar = document.getElementById("sel-bar");
  const count = document.getElementById("sel-count");
  const n = selectedIds.size;
  count.textContent = n===1 ? "1 selecionado" : `${n} selecionados`;
  if(n>0) bar.classList.add("visible");
  else bar.classList.remove("visible");
}

function clearSelection(){

}

async function moveSelected(){
  const dest = parseInt(document.getElementById("sel-dest").value);

  const today = new Date().toISOString().split("T")[0];

}

async function saveLead(){
  const user=document.getElementById("f-user").value.trim().replace(/^@/,"");
  if(!user){ toast("Informe o @ do lead."); return; }
  const data={
    username:user,
    score:document.getElementById("f-score").value||null,
    stage:parseInt(document.getElementById("f-stage").value),
    prof:document.getElementById("f-prof").value.trim(),
    note:document.getElementById("f-note").value.trim(),
    lastDate:document.getElementById("f-date").value,
    fluxo:fState.fluxo||"NS",
    cls:fState.cls||"Q",
    tipo_perfil:fState.tipo||"publico",
    color:{AQ:"#4ADE80",Q:"#60A5FA",N:"#FCD34D",NQ:"#F87171"}[fState.cls||"Q"]||"#60A5FA",
  };
  try{
    if(editId){
      // Salva todos os campos incluindo lastDate se o usuário alterou manualmente
      await updateLeadDB(editId, data);
      const i=leads.findIndex(l=>l.id===editId);
      if(i>-1) leads[i]={...leads[i],...data};
      // Sincronizar edição de volta ao Qualificador (se existir lá)
      await syncToQualificador(editId, leads.find(l=>l.id===editId));
      toast("Lead atualizado!");
    } else {
      const newLead={id:Date.now().toString(),...data,createdAt:new Date().toISOString()};
      await insertLeadDB(newLead);
      leads.unshift(newLead);
      toast("Lead adicionado!");
    }
    render(); closeM("modal-add");
  }catch(e){ toast("❌ Erro ao salvar. Tente novamente."); }
}

async function syncToQualificador(pipelineId, lead){
  if(!lead) return;
  try{
    // Verifica se existe no qualificador pelo username
    const { data } = await sb.from("leads_cdp")
      .select("id").eq("username", lead.username).limit(1);
    if(!data || !data.length) return; // não existe no qualificador
    await sb.from("leads_cdp").update({
      prof: lead.prof||"",
      fluxo: lead.fluxo||"NS",
      tipo_perfil: lead.tipo_perfil||"publico",
    }).eq("username", lead.username);
  }catch(e){ console.error("syncToQualificador error:", e); }
}

async function delLead(){
  if(!editId||!confirm("Excluir lead?")) return;
  try{
    await deleteLeadDB(editId);
    leads=leads.filter(l=>l.id!==editId);
    render(); closeM("modal-add"); toast("Excluído.");
  }catch(e){ toast("❌ Erro ao excluir."); }
}

function importBackup(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try{
      const data = JSON.parse(ev.target.result);
      const imported = data.leads || data;
      if(!Array.isArray(imported)) throw new Error();
      const existing = leads.map(l=>l.id);
      const news = imported.filter(l=>!existing.includes(l.id));
      if(!news.length){ toast("Nenhum lead novo para importar."); return; }
      const rows = news.map(l=>({
        id: l.id, user_id: currentUser.id,
        username: l.username, score: l.score||null,
        cls: l.cls||"Q", color: l.color||"#60A5FA",
        fluxo: l.fluxo||"NS", prof: l.prof||"",
        note: l.note||"", stage: l.stage||0,
        last_date: l.lastDate||new Date().toISOString().split("T")[0],
        from_cdp: l.fromCDP||false
      }));
      const { error } = await sb.from("pipeline_leads").insert(rows);
      if(error) throw error;
      leads = [...news, ...leads];
      render();
      toast(`✅ ${news.length} lead(s) restaurado(s) com sucesso!`);
    }catch{ toast("❌ Arquivo inválido ou erro ao importar."); }
  };
  reader.readAsText(file);
  e.target.value="";
}

    render();
        document.querySelectorAll(".pipe-cls-filter").forEach(btn=>{
      btn.style.opacity = btn.dataset.cls==="all" ? "1" : "0.55";
      btn.style.outline = btn.dataset.cls==="all" ? "2px solid currentColor" : "none";
    });
  } catch(e){
    console.error("Erro ao inicializar:", e);
  } finally {
    hideLoading();
  }
}

function togglePipeToolbar(){
  const body = document.getElementById("pipe-toolbar-body");
  const arrow = document.getElementById("pipe-toolbar-arrow");
  const toggle = document.getElementById("pipe-toolbar-toggle");
  if(!body) return;
  const isHidden = body.style.display === "none";
  body.style.display = isHidden ? "flex" : "none";
  if(arrow) arrow.textContent = isHidden ? "▲" : "▼";
}

async function sair(){
  await sb.auth.signOut();
  window.location.href="index.html";
}

init();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
function exportXLSX(){
  if(!leads.length){ toast("Nenhum lead para exportar."); return; }

  const stageLabel = STAGES.map(s=>s.label);
  const clsLabel   = {AQ:"Altamente Qualificado", Q:"Qualificado", N:"Neutro", NQ:"Não Qualificado"};

  const rows = leads.map(l=>{
    const d = l.lastDate ? Math.floor((Date.now()-new Date(l.lastDate).getTime())/864e5) : "";
    return {
      "@Perfil":               l.username || "",
      "Etapa":                 stageLabel[l.stage] ?? "",
      "Fluxo":                 l.fluxo || "",
      "Classificação CDP":     l.cls || "",
      "Descrição":             clsLabel[l.cls] || "",
      "Score (0–10)":          l.score ?? "",
      "Profissão":             l.prof || "",
      "Dias na etapa":         d,
      "Data última interação": l.lastDate || "",
      "Observação":            l.note || "",
    };
  });

  rows.sort((a,b)=>{
    const sa = leads.find(l=>l.username===a["@Perfil"])?.stage ?? 0;
    const sb = leads.find(l=>l.username===b["@Perfil"])?.stage ?? 0;
    return sa-sb;
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  ws["!cols"] = [
    {wch:22},{wch:26},{wch:8},{wch:16},{wch:22},
    {wch:12},{wch:18},{wch:14},{wch:22},{wch:35}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Pipeline");

  const date = new Date().toLocaleDateString("pt-BR").replace(/\//g,"-");
  XLSX.writeFile(wb, `pipeline-followup-${date}.xlsx`);
  toast("📊 Excel exportado com sucesso!");
}
</script>
